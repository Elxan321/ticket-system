version: "3.8"

services:
  backend:
    build: .
    container_name: backend
    restart: always
    ports:
      - "8081:8081"

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./web:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend