server {
    listen 80;

    server_name e-miras.xyz www.e-miras.xyz;

    root /usr/share/nginx/html;
    index login.html;

    location / {
        try_files $uri $uri/ /login.html;
    }

    # Public auth routes on backend
    location = /login {
        proxy_pass http://backend:8081/login;
    }

    location = /register {
        proxy_pass http://backend:8081/register;
    }

    location /api/ {
        proxy_pass http://backend:8081;
    }
}